name: Build document

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'OpenBuro-FilePicker.md'
      - 'package.json'
      - 'scripts/build-doc.mjs'
      - '.github/workflows/build-document.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'OpenBuro-FilePicker.md'
      - 'package.json'
      - 'scripts/build-doc.mjs'
      - '.github/workflows/build-document.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build root document
        run: npm run build:doc
      - name: Check generated document is committed
        run: git diff --exit-code -- OpenBuro-FilePicker.md
      - name: Upload built document
        uses: actions/upload-artifact@v4
        with:
          name: OpenBuro-FilePicker
          path: OpenBuro-FilePicker.md
