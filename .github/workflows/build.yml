name: Build documentation

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.excalidraw'
      - '**/*.excalidraw.svg'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.excalidraw'
      - '**/*.excalidraw.svg'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate generated files
        run: npm run check
      - name: Check generated root document is committed
        run: git diff --exit-code -- OpenBuro-FilePicker.md

  generate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Firefox for Excalidraw export
        run: npx playwright install firefox
      - name: Generate diagrams and root document
        run: npm run build
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OpenBuro-FilePicker.md src/pages src/diagrams
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate documentation"
            git push
          fi
      - name: Upload built document
        uses: actions/upload-artifact@v4
        with:
          name: OpenBuro-FilePicker
          path: OpenBuro-FilePicker.md
