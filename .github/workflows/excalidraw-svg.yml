name: Excalidraw diagrams

# Verifies that every Excalidraw diagram referenced from Markdown has an
# up-to-date committed SVG. This is a pure hash check — no browser needed — so
# it runs in seconds. To regenerate locally: `npm install && npm run diagrams`.

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.excalidraw'
      - 'scripts/excalidraw-md.mjs'
      - '.github/workflows/excalidraw-svg.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.excalidraw'
      - 'scripts/excalidraw-md.mjs'
      - '.github/workflows/excalidraw-svg.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check diagrams are up to date
        run: node scripts/excalidraw-md.mjs --check
